<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Via Paris - Admin</title>
  <meta name="description" content="Painel administrativo Via Paris." />
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/images/favicon/16x16.png?v=5" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon/32x32.png?v=5" />
  <link rel="icon" type="image/png" sizes="48x48" href="../assets/images/favicon/48x48.png?v=5" />
  <link rel="icon" type="image/png" sizes="512x512" href="../assets/images/favicon/favicon-512x512.png?v=5" />
  <link rel="shortcut icon" href="../assets/images/favicon/32x32.png?v=5" />
  <link rel="apple-touch-icon" href="../assets/images/favicon/favicon-512x512.png?v=5" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .admin-page {
      min-height: 100vh;
      padding: 40px 0;
    }
  </style>
</head>
<body>
  <main class="admin-page">
    <section id="admin" class="section section-dark" style="padding-top: 0;">
      <div class="container">
        <p class="kicker">Painel</p>
        <h1>Espaco Admin</h1>
        <p class="section-intro">Gerencie eventos, mesas e fotos da home.</p>

        <div id="admin-login" class="admin-login">
          <label for="admin-pin">PIN admin</label>
          <input id="admin-pin" type="password" placeholder="Digite o PIN" />
          <button id="admin-open" class="btn btn-primary" type="button">Entrar</button>
          <p class="admin-hint">PIN padrao: 1234</p>
        </div>

        <div id="admin-panel" class="admin-panel" hidden>
          <div class="admin-actions">
            <button id="admin-close" class="btn btn-outline" type="button">Sair do admin</button>
          </div>

          <div class="admin-grid">
            <article class="admin-card">
              <h3>Eventos</h3>
              <form id="event-form" class="admin-form">
                <input id="event-edit-id" type="hidden" />
                <input id="event-title" type="text" placeholder="Nome da festa" required />
                <input id="event-date" type="text" placeholder="Data e horario" required />
                <input id="event-price" type="text" placeholder="Valor da entrada (ex.: 15 EUR)" required />
                <textarea id="event-details" rows="3" placeholder="Detalhes do evento" required></textarea>

                <div id="event-flyer-drop" class="upload-dropzone" role="button" tabindex="0" data-file-input="event-flyer-file">
                  Arraste o flyer aqui ou clique para selecionar
                </div>
                <input id="event-flyer-file" class="upload-input" type="file" accept="image/*" />
                <img id="event-flyer-preview" class="upload-preview" alt="Preview do flyer" hidden />

                <button id="event-save-btn" class="btn btn-primary" type="button">Adicionar evento</button>
                <button id="event-cancel-edit" class="btn btn-outline" type="button" hidden>Cancelar edicao</button>
              </form>
              <div id="admin-events-list" class="admin-list"></div>
            </article>

            <article class="admin-card">
              <h3>Mesas</h3>
              <form id="table-form" class="admin-form">
                <input id="table-edit-id" type="hidden" />
                <select id="table-event-id" required>
                  <option value="">Selecione o evento</option>
                </select>
                <input id="table-name" type="text" placeholder="Nome da mesa (VIP, Lounge...)" required />
                <input id="table-qty" type="number" min="1" placeholder="Quantidade disponivel" required />
                <input id="table-notes" type="text" placeholder="Observacao (opcional)" />
                <button id="table-save-btn" class="btn btn-primary" type="button">Adicionar mesa</button>
                <button id="table-cancel-edit" class="btn btn-outline" type="button" hidden>Cancelar edicao</button>
              </form>
              <div id="admin-tables-list" class="admin-list"></div>
            </article>

            <article class="admin-card">
              <h3>Midia da Home</h3>
              <form id="home-form" class="admin-form">
                <div id="hero-drop" class="upload-dropzone" role="button" tabindex="0" data-file-input="hero-photo-file">
                  Arraste a midia principal (foto/video) aqui ou clique para selecionar
                </div>
                <input id="hero-photo-file" class="upload-input" type="file" accept="image/*,video/*" />
                <img id="hero-photo-preview" class="upload-preview" alt="Preview da foto principal" hidden />
                <video id="hero-video-preview" class="upload-preview" muted loop playsinline controls hidden></video>

                <div id="gallery-drop" class="upload-dropzone" role="button" tabindex="0" data-file-input="gallery-files">
                  Arraste fotos da galeria aqui (multiplas) ou clique para selecionar
                </div>
                <input id="gallery-files" class="upload-input" type="file" accept="image/*" multiple />
                <div id="gallery-preview" class="upload-preview-grid"></div>

                <button class="btn btn-primary" type="submit">Salvar fotos</button>
              </form>
            </article>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-config.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
